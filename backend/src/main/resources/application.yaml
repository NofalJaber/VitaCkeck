spring:
  application:
    name: VitaCheck
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000 # 24 hours in milliseconds

gemini:
  api:
    keys: ${AI_API_KEYS}

resend:
  api:
    key: ${RESEND_API_KEY:your_local_api_key_here}
  sender:
    email: ${MAIL_USERNAME:onboarding@resend.dev}

app:
  cookie:
    secure: ${COOKIE_SECURE:false}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}